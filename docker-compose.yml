version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview-connect-app
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:mysql://mysql:3306/interview_connect}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-ic_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-ic_password}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-your-very-long-secret-key-change-in-production}
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: interview-connect-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: interview_connect
      MYSQL_USER: ${DB_USERNAME:-ic_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ic_password}
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interview-connect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
