<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}">
    <title>이메일 인증 - Interview Connect</title>
</head>

<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5">
                <!-- 로고 -->
                <div class="text-center mb-4">
                    <a th:href="@{/}" class="text-decoration-none">
                        <h2 class="text-primary">
                            <i class="fas fa-handshake"></i> Interview Connect
                        </h2>
                    </a>
                    <p class="text-muted">이메일 인증을 완료해주세요</p>
                </div>

                <!-- 인증 폼 -->
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center mb-4">
                            <i class="fas fa-envelope-open text-primary"></i>
                            이메일 인증
                        </h3>

                        <!-- 성공 메시지 -->
                        <div th:if="${message}" class="alert alert-success" role="alert">
                            <i class="fas fa-check-circle"></i>
                            <span th:text="${message}">성공 메시지</span>
                        </div>

                        <!-- 오류 메시지 -->
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <i class="fas fa-exclamation-circle"></i>
                            <span th:text="${error}">오류 메시지</span>
                        </div>

                        <!-- 인증 안내 -->
                        <div class="alert alert-info" role="alert">
                            <h6 class="alert-heading">
                                <i class="fas fa-info-circle"></i> 이메일을 확인해주세요
                            </h6>
                            <p class="mb-2">
                                <strong th:text="${email}">user@example.com</strong> 주소로
                                6자리 인증 코드를 발송했습니다.
                            </p>
                            <p class="mb-0 small">
                                인증 코드는 1시간 후 만료됩니다.
                            </p>
                        </div>

                        <!-- 인증 코드 입력 폼 -->
                        <form th:action="@{/auth/verify-email}" method="post">
                            <input type="hidden" name="email" th:value="${email}">

                            <div class="mb-3">
                                <label for="code" class="form-label">
                                    <i class="fas fa-key text-primary"></i>
                                    인증 코드 <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="code" id="code" class="form-control text-center"
                                       placeholder="000000"
                                       maxlength="6"
                                       pattern="[0-9]{6}"
                                       style="font-size: 1.2rem; letter-spacing: 0.2rem;"
                                       required autofocus>
                                <div class="form-text">이메일로 받은 6자리 숫자를 입력해주세요.</div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="fas fa-check"></i> 인증 확인
                            </button>
                        </form>

                        <!-- 재발송 버튼 -->
                        <div class="text-center">
                            <p class="text-muted mb-2">인증 코드를 받지 못하셨나요?</p>
                            <form th:action="@{/auth/resend-code}" method="post" style="display: inline;">
                                <input type="hidden" name="email" th:value="${email}">
                                <button type="submit" class="btn btn-outline-secondary btn-sm">
                                    <i class="fas fa-redo"></i> 인증 코드 재발송
                                </button>
                            </form>
                        </div>

                        <!-- 다른 이메일로 가입 -->
                        <div class="text-center mt-4 pt-3 border-top">
                            <p class="text-muted mb-0">
                                다른 이메일로 가입하시겠습니까?
                                <a th:href="@{/auth/signup}" class="text-decoration-none">회원가입</a>
                            </p>
                        </div>
                    </div>
                </div>

                <!-- 로그인 링크 -->
                <div class="text-center mt-4">
                    <p class="text-muted small">
                        이미 인증을 완료하셨나요?
                        <a th:href="@{/auth/login}" class="text-decoration-none">로그인</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>

    <!-- 인증 코드 입력 스크립트 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const codeInput = document.getElementById('code');

            // 숫자만 입력 가능하도록 제한
            codeInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');

                // 6자리 입력 시 자동 제출
                if (this.value.length === 6) {
                    this.form.submit();
                }
            });

            // 붙여넣기 시 숫자만 추출
            codeInput.addEventListener('paste', function(e) {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text');
                const numbers = paste.replace(/[^0-9]/g, '').substring(0, 6);
                this.value = numbers;

                if (numbers.length === 6) {
                    this.form.submit();
                }
            });
        });
    </script>
</body>
</html>
